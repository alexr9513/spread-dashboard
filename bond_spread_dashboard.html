<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spread Curve Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo">
  <span>SPREAD ANALYTICS</span>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <button class="help-btn" onclick="openSettings()" title="Configure filters & columns">⚙ SETTINGS</button>
    <a class="help-btn" href="user_guide.html" target="_blank" title="How to use the dashboard">? HELP</a>
    <a class="help-btn" href="fitting_guide.html" target="_blank" title="Curve fitting reference">? FITTING</a>
    <span id="clock">--:--:--</span>
  </div>
</header>

<!-- settings overlay -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-box" id="settingsBox"></div>
</div>

<div class="layout" id="mainLayout">

  <!-- ── SIDEBAR ── -->
  <div class="sidebar">

    <!-- Active selections -->
    <div style="padding:10px 14px 0; flex-shrink:0; border-bottom:1px solid var(--border)">
      <div class="section-label" style="margin-bottom:6px">
        <span>Active Series</span>
        <button class="clear-btn" onclick="clearAllSelections()">clear all</button>
      </div>
      <div id="selectionTags" style="display:flex;flex-direction:column;gap:4px;
           max-height:130px;overflow-y:auto;margin-bottom:8px"></div>
      <div style="display:flex;gap:4px;padding-bottom:8px">
        <button class="save-view-btn" onclick="promptSaveView()" title="Save current series as a named view">💾 SAVE</button>
        <button class="save-view-btn" onclick="openViewsPanel()" title="Load a saved view">📂 VIEWS</button>
        <button class="save-view-btn" style="margin-left:auto" onclick="exportViews()" title="Export all views to JSON">↓</button>
        <button class="save-view-btn" onclick="importViews()" title="Import views from JSON">↑</button>
      </div>
      <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="handleImportFile(event)">
    </div>

    <!-- Saved views panel (toggled) -->
    <div id="viewsPanel" class="views-panel">
      <div class="section-label" style="margin-bottom:6px">
        <span>Saved Views</span>
        <button class="clear-btn" onclick="closeViewsPanel()">close</button>
      </div>
      <div id="viewsList"></div>
    </div>

    <!-- Dynamic picker steps — rendered by JS from config -->
    <div id="pickerSteps" style="display:flex;flex-direction:column;flex:1;min-height:0"></div>

  </div>

  <!-- ── MAIN ── -->
  <div class="main">

    <!-- stat bar -->
    <div class="stat-bar">
      <div class="stat-item">
        <div class="stat-label">Issuer</div>
        <div class="stat-value accent" id="statIssuer">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Bonds</div>
        <div class="stat-value" id="statBonds">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Avg OAS (bps)</div>
        <div class="stat-value warn" id="statAvgOas">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Min OAS</div>
        <div class="stat-value pos" id="statMinOas">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Max OAS</div>
        <div class="stat-value neg" id="statMaxOas">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Avg Maturity (yr)</div>
        <div class="stat-value" id="statAvgMat">—</div>
      </div>
    </div>

    <!-- chart area -->
    <div class="chart-area">
      <div class="chart-header">
        <div>
          <div class="chart-title" id="chartTitle">SPREAD TO MATURITY</div>
          <div class="chart-subtitle" id="chartSubtitle">Select issuer to begin</div>
        </div>
        <div class="chart-controls" style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
          <div style="display:flex;gap:8px;position:relative">
            <button class="toggle-btn active" id="btnScatter" onclick="setChartType('scatter')">SCATTER</button>
            <button class="toggle-btn" id="btnLine" onclick="setChartType('line')">FIT CURVE</button>
            <button class="toggle-btn" id="btnFitSettings" onclick="toggleFitPanel()" title="Fitting settings">⚙</button>
            <div class="fit-panel" id="fitPanel"></div>
          </div>
          <div style="display:flex;gap:12px">
            <div class="axis-row">
              <span class="axis-label">X</span>
              <select class="axis-select" id="xAxisSelect" onchange="setAxis('x', this.value)">
                <option value="ttm">TTM (years)</option>
              </select>
            </div>
            <div class="axis-row">
              <span class="axis-label">Y</span>
              <select class="axis-select" id="yAxisSelect" onchange="setAxis('y', this.value)">
                <option value="oas">OAS vs Govt (bps)</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- timeline player -->
      <div class="player-bar" id="playerBar">
        <button class="player-btn" id="playerPrev" onclick="playerStep(-1)" title="Previous"><</button>
        <button class="player-btn" id="playerPlayBtn" onclick="playerToggle()" title="Play/Pause">▶</button>
        <button class="player-btn" id="playerNext" onclick="playerStep(1)" title="Next">></button>
        <button class="player-btn" onclick="playerStop()" title="Stop">■</button>
        <div class="player-track" onclick="playerClickTrack(event)">
          <div class="player-progress" id="playerProgress" style="width:0%"></div>
        </div>
        <span class="player-date" id="playerDate">—</span>
        <span class="player-counter" id="playerCounter">—</span>
        <select class="player-speed" id="playerSpeed" onchange="playerSetSpeed(this.value)" title="Playback speed">
          <option value="2000">0.5×</option>
          <option value="1000" selected>1×</option>
          <option value="500">2×</option>
          <option value="250">4×</option>
        </select>
      </div>

      <div class="chart-wrap">
        <canvas id="spreadChart"></canvas>
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">◈</div>
          <div class="empty-text">SELECT AN ISSUER TO VISUALISE SPREAD CURVE</div>
        </div>
      </div>

      <div style="position:relative" id="tableSection">
        <div style="display:flex;justify-content:flex-end;padding:4px 0;position:relative">
          <button class="toggle-btn" onclick="toggleTable()" title="Toggle table" style="margin-right:8px;font-size:8px">▼ TABLE</button>
          <button class="col-picker-btn" onclick="toggleColPicker()">⊞ COLUMNS</button>
          <div class="col-picker-panel" id="colPickerPanel">
            <div class="col-picker-header">
              <span>Visible Columns</span>
              <button class="col-picker-reset" onclick="resetCols()">Reset</button>
            </div>
            <div class="col-picker-grid" id="colPickerGrid"></div>
          </div>
        </div>
        <div class="bond-table-wrap">
          <table>
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="bondTable"></tbody>
          </table>
        </div>
      </div><!-- end tableSection -->
    </div><!-- end chart-area -->
  </div><!-- end main -->
</div><!-- end layout -->

<script src="curve_fit.js"></script>
<script src="dashboard_functions.js"></script>
</body>
</html>
